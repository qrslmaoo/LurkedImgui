<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LurkedAccounts Imgui Customization Tool</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div>
          <h1>LurkedAccounts Imgui Customization Tool</h1>
          <p>Visual editor and project generator</p>
        </div>
      </div>

      <section class="panel">
        <h2>Add</h2>
        <div class="tool-grid">
          <button class="tool-btn" data-add="title" title="Add plain title text">Title</button>
          <button class="tool-btn" data-add="text" title="Add text">Text</button>
          <button class="tool-btn" data-add="button" title="Add button">Button</button>
          <button class="tool-btn" data-add="checkbox" title="Add checkbox">Check</button>
          <button class="tool-btn" data-add="slider" title="Add slider">Slider</button>
          <button class="tool-btn" data-add="input" title="Add input">Input</button>
          <button class="tool-btn" data-add="box" title="Add box">Box</button>
          <button class="tool-btn" data-add="image" title="Add image">Image</button>
          <button class="tool-btn" data-add="combo" title="Add combo">Combo</button>
          <button class="tool-btn" data-add="progress" title="Add progress">Progress</button>
          <button class="tool-btn" data-add="color" title="Add color picker">Color</button>
          <button class="tool-btn" data-add="separator" title="Add separator">Separator</button>
          <button class="tool-btn" data-add="tabs" title="Add tabs">Tabs</button>
          <button class="tool-btn" data-add="table" title="Add table">Table</button>
        </div>
      </section>

      <section class="panel">
        <h2>Pages</h2>
        <label>
          Current page
          <select id="pageSelect"></select>
        </label>
        <label>
          Page name
          <input id="pageName" type="text" spellcheck="false">
        </label>
        <div class="row-actions">
          <button id="addPageBtn" class="secondary">Add</button>
          <button id="duplicatePageBtn" class="secondary">Duplicate</button>
        </div>
        <button id="deletePageBtn" class="danger">Delete Page</button>
        <div class="split-fields">
          <label>
            Transition
            <select id="pageTransitionType">
              <option value="none">None</option>
              <option value="fade">Fade</option>
              <option value="slideIn">Slide In</option>
            </select>
          </label>
          <label>
            Speed ms
            <input id="pageTransitionSpeed" type="number" min="60" max="4000" value="350">
          </label>
        </div>
        <label>
          Slide distance
          <input id="pageTransitionDistance" type="number" min="0" max="160" value="32">
        </label>
      </section>

      <section class="panel">
        <h2>Project</h2>
        <label>
          Name
          <input id="projectName" type="text" value="GeneratedImGuiApp" spellcheck="false">
        </label>
        <label>
          Window title
          <input id="windowTitle" type="text" value="My ImGui Tool" spellcheck="false">
        </label>
        <div class="split-fields">
          <label>
            Width
            <input id="windowWidth" type="number" min="320" max="1600" value="820">
          </label>
          <label>
            Height
            <input id="windowHeight" type="number" min="240" max="1200" value="560">
          </label>
        </div>
        <label>
          Author
          <input id="projectAuthor" type="text" value="LurkedAccounts" spellcheck="false">
        </label>
        <div class="split-fields">
          <label>
            Version
            <input id="projectVersion" type="text" value="1.0.0" spellcheck="false">
          </label>
          <label>
            Backend
            <select id="projectBackend">
              <option value="glfw-opengl">GLFW OpenGL</option>
              <option value="win32-dx11">Win32 DX11 scaffold</option>
              <option value="sdl-opengl">SDL OpenGL scaffold</option>
            </select>
          </label>
        </div>
      </section>

      <section class="panel">
        <h2>Window Flags</h2>
        <label class="check-row"><input id="flagNoTitleBar" type="checkbox">No title bar</label>
        <label class="check-row"><input id="flagNoResize" type="checkbox">No resize</label>
        <label class="check-row"><input id="flagNoScrollbar" type="checkbox">No scrollbar</label>
        <label class="check-row"><input id="flagAlwaysAutoResize" type="checkbox">Always auto resize</label>
      </section>

      <section class="panel">
        <h2>Presets</h2>
        <label>
          Theme preset
          <select id="themePreset">
            <option value="blank">Blank Slate</option>
            <option value="dark">Dark Utility</option>
            <option value="red">Red Black</option>
            <option value="blue">Blue Gray</option>
            <option value="light">Light</option>
            <option value="glass">Glass</option>
          </select>
        </label>
        <div class="row-actions">
          <button id="applyThemePresetBtn" class="secondary">Apply Theme</button>
          <button id="saveThemePresetBtn" class="secondary">Save Theme</button>
        </div>
        <label>
          Custom theme name
          <input id="customThemeName" type="text" placeholder="My Theme" spellcheck="false">
        </label>
        <button id="deleteThemePresetBtn" class="danger">Delete Custom Theme</button>
        <label>
          Style preset
          <select id="stylePreset"></select>
        </label>
        <div class="row-actions">
          <button id="saveStylePresetBtn" class="secondary">Save Style</button>
          <button id="applyStylePresetBtn" class="secondary">Apply Style</button>
        </div>
      </section>
    </aside>

    <aside class="sidebar right-sidebar">
      <section class="panel">
        <h2>Window Style</h2>
        <div class="style-grid">
          <label>
            Window
            <input id="themeWindowBg" type="color" value="#2b3038">
          </label>
          <label>
            Title
            <input id="themeTitleBg" type="color" value="#20242a">
          </label>
          <label>
            Text
            <input id="themeTitleText" type="color" value="#f4f5f6">
          </label>
          <label>
            Border
            <input id="themeWindowBorder" type="color" value="#111316">
          </label>
        </div>
        <label>
          Window curves
          <div class="range-number">
            <input id="themeWindowRadiusRange" type="range" min="0" max="40" value="0">
            <input id="themeWindowRadius" type="number" min="0" max="40" value="0">
          </div>
        </label>
        <label>
          Opacity
          <input id="themeWindowOpacity" type="number" min="0" max="100" value="100">
        </label>
        <div class="split-fields">
          <label>
            Padding X
            <input id="themePaddingX" type="number" min="0" max="80" value="8">
          </label>
          <label>
            Padding Y
            <input id="themePaddingY" type="number" min="0" max="80" value="8">
          </label>
        </div>
      </section>

      <section class="panel">
        <h2>Selection</h2>
        <label>
          Property search
          <input id="propertySearch" type="search" placeholder="Filter properties" spellcheck="false">
        </label>
        <div class="row-actions">
          <button id="selectAllBtn" class="secondary">Select All</button>
          <button id="groupBtn" class="secondary">Group Box</button>
        </div>
        <div class="tool-grid">
          <button class="tool-btn compact-tool" data-align="left">Align Left</button>
          <button class="tool-btn compact-tool" data-align="center">Align Center</button>
          <button class="tool-btn compact-tool" data-align="right">Align Right</button>
          <button class="tool-btn compact-tool" data-align="top">Align Top</button>
          <button class="tool-btn compact-tool" data-align="middle">Align Middle</button>
          <button class="tool-btn compact-tool" data-align="bottom">Align Bottom</button>
          <button class="tool-btn compact-tool" data-align="sameW">Same Width</button>
          <button class="tool-btn compact-tool" data-align="sameH">Same Height</button>
        </div>
        <div id="emptyInspector" class="muted">Select an item on the canvas.</div>
        <div id="inspector" class="inspector hidden">
          <label>
            Label
            <input id="propLabel" type="text" spellcheck="false">
          </label>
          <div class="split-fields">
            <label>
              X
              <input id="propX" type="number">
            </label>
            <label>
              Y
              <input id="propY" type="number">
            </label>
          </div>
          <div class="split-fields">
            <label>
              W
              <input id="propW" type="number">
            </label>
            <label>
              H
              <input id="propH" type="number">
            </label>
          </div>
          <div class="split-fields" id="rangeFields">
            <label>
              Min
              <input id="propMin" type="number" step="0.1">
            </label>
            <label>
              Max
              <input id="propMax" type="number" step="0.1">
            </label>
          </div>
          <label id="valueField">
            Value
            <input id="propValue" type="text" spellcheck="false">
          </label>
          <label id="optionsField">
            Options
            <input id="propOptions" type="text" placeholder="One, Two, Three" spellcheck="false">
          </label>
          <div class="split-fields" id="buttonActionFields">
            <label>
              On click
              <select id="propActionType">
                <option value="none">No action</option>
                <option value="navigate">Open page</option>
              </select>
            </label>
            <label>
              Target page
              <select id="propTargetPage"></select>
            </label>
          </div>
          <div class="split-fields" id="tableFields">
            <label>
              Rows
              <input id="propRows" type="number" min="1" max="20">
            </label>
            <label>
              Cols
              <input id="propCols" type="number" min="1" max="8">
            </label>
          </div>
          <label id="imageField" class="file-label compact">
            Choose Image
            <input id="imagePicker" type="file" accept="image/*">
          </label>
          <div class="style-grid">
            <label>
              Fill
              <input id="propFill" type="color">
            </label>
            <label>
              Gradient
              <input id="propFill2" type="color">
            </label>
            <label>
              Border
              <input id="propBorder" type="color">
            </label>
            <label>
              Text
              <input id="propTextColor" type="color">
            </label>
          </div>
          <label>
            Widget curves
            <div class="range-number">
              <input id="propRadiusRange" type="range" min="0" max="40">
              <input id="propRadius" type="number" min="0" max="40">
            </div>
          </label>
          <label>
            Opacity
            <input id="propOpacity" type="number" min="0" max="100">
          </label>
          <div class="split-fields">
            <label>
              Font
              <input id="propFontSize" type="number" min="8" max="96">
            </label>
            <label>
              Border W
              <input id="propBorderWidth" type="number" min="0" max="12">
            </label>
          </div>
          <div class="split-fields">
            <label>
              Font preset
              <select id="propFontFamily">
                <option value="default">ImGui default</option>
                <option value="sans">Clean sans</option>
                <option value="serif">Display serif</option>
                <option value="mono">Monospace</option>
              </select>
            </label>
            <label id="textSurfaceField">
              Text look
              <select id="propTextSurface">
                <option value="plain">Plain text</option>
                <option value="glass">Glass label</option>
              </select>
            </label>
          </div>
          <div class="split-fields">
            <label>
              Align
              <select id="propAlign">
                <option value="left">Left</option>
                <option value="center">Center</option>
                <option value="right">Right</option>
              </select>
            </label>
            <label>
              Gradient
              <select id="propGradientDir">
                <option value="vertical">Vertical</option>
                <option value="horizontal">Horizontal</option>
                <option value="diagonal">Diagonal</option>
              </select>
            </label>
          </div>
          <label id="imageFitField">
            Image fit
            <select id="propImageFit">
              <option value="cover">Cover</option>
              <option value="contain">Contain</option>
              <option value="stretch">Stretch</option>
            </select>
          </label>
          <div class="style-grid" id="imageAdjustFields">
            <label>
              Tint
              <input id="propTint" type="color">
            </label>
            <label>
              Crop X
              <input id="propCropX" type="number" min="0" max="100">
            </label>
            <label>
              Crop Y
              <input id="propCropY" type="number" min="0" max="100">
            </label>
            <label>
              Zoom
              <input id="propZoom" type="number" min="50" max="300">
            </label>
          </div>
          <label class="check-row">
            <input id="propGradient" type="checkbox">
            Use gradient
          </label>
          <label class="check-row">
            <input id="propVisible" type="checkbox">
            Visible in export
          </label>
          <label class="check-row">
            <input id="propLocked" type="checkbox">
            Lock position
          </label>
          <div class="row-actions">
            <button id="duplicateBtn" class="secondary">Duplicate</button>
            <button id="deleteBtn" class="danger">Delete</button>
          </div>
          <div class="row-actions">
            <button id="backBtn" class="secondary">Send Back</button>
            <button id="frontBtn" class="secondary">Bring Front</button>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>Layers</h2>
        <input id="layerSearch" type="search" placeholder="Search layers" spellcheck="false">
        <div id="layersList" class="layers-list"></div>
      </section>

      <section class="panel">
        <h2>Validation</h2>
        <div id="validationList" class="validation-list muted"></div>
      </section>

      <section class="panel">
        <h2>Animations</h2>
        <div class="tool-grid">
          <button class="tool-btn compact-tool" data-anim-preset="hoverLift">Hover Lift</button>
          <button class="tool-btn compact-tool" data-anim-preset="hoverGlow">Hover Glow</button>
          <button class="tool-btn compact-tool" data-anim-preset="pulse">Pulse</button>
          <button class="tool-btn compact-tool" data-anim-preset="slideIn">Slide In</button>
          <button class="tool-btn compact-tool" data-anim-preset="shake">Shake</button>
          <button class="tool-btn compact-tool" data-anim-preset="fade">Fade</button>
        </div>
        <div class="split-fields">
          <label>
            Effect
            <select id="animType">
              <option value="none">None</option>
              <option value="hoverLift">Hover Lift</option>
              <option value="hoverGlow">Hover Glow</option>
              <option value="pulse">Pulse</option>
              <option value="slideIn">Slide In</option>
              <option value="shake">Shake</option>
              <option value="fade">Fade</option>
            </select>
          </label>
          <label>
            Trigger
            <select id="animTrigger">
              <option value="always">Always</option>
              <option value="hover">Hover</option>
              <option value="active">Active/Click</option>
            </select>
          </label>
        </div>
        <div class="split-fields">
          <label>
            Speed ms
            <input id="animSpeed" type="number" min="60" max="4000" value="400">
          </label>
          <label>
            Distance
            <input id="animDistance" type="number" min="0" max="80" value="8">
          </label>
        </div>
        <div class="split-fields">
          <label>
            Intensity
            <input id="animIntensity" type="number" min="0" max="100" value="35">
          </label>
          <label>
            Delay ms
            <input id="animDelay" type="number" min="0" max="4000" value="0">
          </label>
        </div>
        <div class="row-actions">
          <button id="applyAnimationBtn" class="secondary">Apply Animation</button>
          <button id="clearAnimationBtn" class="secondary">Clear Animation</button>
        </div>
      </section>

      <section class="panel">
        <h2>Export</h2>
        <button id="writeDirBtn" class="primary">Write Project Directory</button>
        <button id="downloadZipBtn" class="secondary">Download Zip</button>
        <button id="saveLayoutBtn" class="secondary">Save Layout</button>
        <label class="file-label">
          Load Layout
          <input id="loadLayoutInput" type="file" accept="application/json">
        </label>
        <p id="status" class="status" role="status"></p>
      </section>
    </aside>

    <main class="workspace">
      <div class="topbar">
        <div class="segmented" aria-label="View mode">
          <button id="designTab" class="active">Design</button>
          <button id="codeTab">Code</button>
        </div>
        <div class="canvas-tools">
          <button id="undoBtn" class="icon-btn" title="Undo">U</button>
          <button id="redoBtn" class="icon-btn" title="Redo">R</button>
          <button id="interactionToggle" class="icon-btn" title="Test page navigation">&gt;</button>
          <button id="gridToggle" class="icon-btn active" title="Toggle grid">#</button>
          <label class="snap-label" title="Snap size">
            Snap
            <input id="snapSize" type="number" min="1" max="64" value="8">
          </label>
          <button id="clearBtn" class="icon-btn" title="Clear layout">x</button>
        </div>
      </div>

      <section id="designView" class="design-view">
        <div id="canvasWrap" class="canvas-wrap">
          <div id="canvas" class="imgui-window">
            <div class="imgui-titlebar">
              <span id="canvasTitle">My ImGui Tool</span>
              <span class="window-dots">o o o</span>
            </div>
            <div id="stage" class="stage"></div>
          </div>
        </div>
      </section>

      <section id="codeView" class="code-view hidden">
        <div class="code-header">
          <label class="code-select-label">
            File
            <select id="codeFileSelect"></select>
          </label>
          <button id="copyCodeBtn" class="secondary">Copy</button>
        </div>
        <pre><code id="codePreview"></code></pre>
      </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
